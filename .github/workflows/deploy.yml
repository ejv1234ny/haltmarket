name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vercel:
    name: deploy web (Vercel)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  supabase-migrate:
    name: supabase db push (prod)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SUPABASE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  railway:
    name: deploy python workers (Railway)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_RAILWAY_DEPLOY == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        service: [monitor, resolver]
    steps:
      - uses: actions/checkout@v4
      - name: railway up
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "haltmarket-${{ matrix.service }}"
