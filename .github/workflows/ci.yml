name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.33.0
  NODE_VERSION: 20.18.0
  PYTHON_VERSION: "3.12"

jobs:
  node:
    name: node lint + typecheck + test + build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      LEDGER_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: ledger integration (pg17)
        run: ./scripts/ledger-integration.sh

      - name: build
        run: pnpm build

  python:
    name: python lint + typecheck + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [monitor, resolver]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: sync
        run: uv sync --all-extras

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest

  supabase:
    # Display name kept as "supabase db lint" so the existing branch-protection
    # required-check stays matched. The job verifies that every migration in
    # supabase/migrations/ applies cleanly to a fresh Postgres 17 matching
    # supabase/config.toml's [db] major_version — a stricter check than
    # `supabase db lint` (which is a parse/typecheck on the same SQL) and
    # surfaces the same errors by executing CREATE FUNCTION etc.
    name: supabase db lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: apply migrations
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if (( ${#files[@]} == 0 )); then
            echo "no migrations yet — skipping"
            exit 0
          fi
          psql "postgres://postgres:postgres@127.0.0.1:5432/postgres" \
            --set=ON_ERROR_STOP=1 \
            -f scripts/ledger-integration-setup.sql
          for f in "${files[@]}"; do
            echo "▶ applying $f"
            psql "postgres://postgres:postgres@127.0.0.1:5432/postgres" \
              --set=ON_ERROR_STOP=1 \
              -f "$f"
          done

  playwright:
    # AGENTS.md §6 Phase 7+ gate: Playwright smoke tests for the frontend.
    # Runs in the official Playwright container which ships all browser deps.
    name: playwright smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build web
        run: pnpm --filter @haltmarket/web build

      - name: playwright smoke
        working-directory: apps/web
        env:
          CI: "true"
        run: pnpm test:e2e

      - name: upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  ledger-guard:
    name: ledger-mutation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: diff vs base
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}"
          if ! git cat-file -e "${base}" 2>/dev/null; then
            echo "base ${base} not in history; comparing full migrations tree instead"
            files=$(git ls-files 'supabase/migrations/**/*.sql')
          else
            files=$(git diff --name-only "${base}" HEAD -- 'supabase/migrations/**/*.sql' || true)
          fi
          if [ -z "${files}" ]; then
            echo "no migration changes — ok"
            exit 0
          fi
          echo "scanning: ${files}"
          offenders=""
          for f in ${files}; do
            if grep -Eiq '(^|[^a-zA-Z_])(update|delete)[[:space:]]+(from[[:space:]]+)?[`"]?ledger_entries[`"]?' "$f"; then
              offenders="${offenders}${f}\n"
            fi
          done
          if [ -n "${offenders}" ]; then
            printf "ledger_entries is append-only — forbidden mutation(s) detected:\n%b" "${offenders}"
            exit 1
          fi
          echo "ok — no mutating statements against ledger_entries"
